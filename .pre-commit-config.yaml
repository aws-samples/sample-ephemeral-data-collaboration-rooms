default_language_version:
  node: system

repos:
    # SECURITY - Only keeping credential detection in pre-commit
    # Removed Semgrep and Bandit as they're duplicated in ASH and CI pipeline
    - repo: https://github.com/Yelp/detect-secrets
      rev: v1.5.0
      hooks:
          - id: detect-secrets
            exclude: (?x)(
                README.md
              )


    # FORMATTING & MISC
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v5.0.0
      hooks:
          - id: check-json
          - id: check-yaml
            args: [--unsafe]  # Allow custom YAML tags
          - id: check-case-conflict
          - id: trailing-whitespace
          - id: mixed-line-ending
            args: ['--fix=lf']
          - id: fix-byte-order-marker
          - id: check-merge-conflict
          - id: detect-private-key
          - id: detect-aws-credentials
            args:
                - --allow-missing-credentials
    - repo: https://github.com/codespell-project/codespell
      rev: v2.4.1
      hooks:
          - id: codespell
            entry: bash -c 'codespell "$@" || true' -- # Don't block, just alert
            verbose: true
    - repo: https://github.com/pre-commit/mirrors-prettier
      rev: 'v4.0.0-alpha.8'
      hooks:
          - id: prettier
            files: .*\.(ya?ml|json|md)$
            exclude: (?x)^(
                .pre-commit-config.yaml|
                mkdocs.yml|
                )$

    # PYTHON FORMATTING
    - repo: https://github.com/ambv/black
      rev: '25.1.0'
      hooks:
          - id: black
            args: ["--line-length=120"]
    - repo: https://github.com/pycqa/flake8
      rev: '7.3.0'
      hooks:
          - id: flake8
            args: ["--max-line-length=120", "--extend-ignore=E203,E501"]
    - repo: https://github.com/asottile/reorder_python_imports
      rev: v3.15.0
      hooks:
          - id: reorder-python-imports
            args: [--py3-plus]
    - repo: https://github.com/asottile/pyupgrade
      rev: v3.20.0
      hooks:
          - id: pyupgrade
            args: [--py36-plus]
    - repo: https://github.com/asottile/add-trailing-comma
      rev: v3.2.0
      hooks:
          - id: add-trailing-comma
            args: [--py36-plus]
    - repo: https://github.com/pre-commit/mirrors-mypy
      rev: v1.17.1
      hooks:
          - id: mypy
            entry: bash -c 'mypy "$@" || true' -- # Don't block, just alert
            verbose: true
            additional_dependencies:
              - types-requests